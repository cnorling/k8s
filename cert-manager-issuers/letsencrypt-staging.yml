apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  namespace: cert-manager
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: me@norling.io
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - dns01:
        webhook:
          solverName: hetzner
          groupName: acme.hetzner.com
          config:
            tokenSecretKeyRef:
              name: hetzner-external-dns
              key: api-key
